services:
  db:
    image: postgres:15
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  web:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - backend/.env
  celery:
    build:
      context: ./backend
    command: celery -A core worker -l info --uid nobody
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - backend/.env
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3030:3030"
    command: sh -c "npm ci && npm run dev"
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - web
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
volumes:
  postgres_data:
  media_data:
