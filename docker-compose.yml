services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "63791:6379"

  web:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_catalog &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - "./catalogue et gestions de stock crud:/app/product-images:ro"
    ports:
      - "8742:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - backend/.env

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - backend/.env

  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3737:3030"
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - DISABLE_HMR=true
    depends_on:
      - web

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env

volumes:
  postgres_data:
  media_data:
  frontend_node_modules:
